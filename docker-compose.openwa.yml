services:
  openwa:
    image: openwa-fixed:latest
    container_name: nadur-openwa
    restart: unless-stopped
    ports:
      - "2785:2785"   # REST API
      - "2886:2886"   # Web dashboard
    environment:
      API_KEY: ${OPENWA_API_KEY:-kasheer360-dev-key}
    volumes:
      - openwa-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2785/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  openwa-data:
