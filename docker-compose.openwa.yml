version: '3.8'

services:
  openwa:
    image: ghcr.io/rmyndharis/openwa:latest
    container_name: nadur-openwa
    restart: unless-stopped
    ports:
      - "2785:2785"   # REST API
      - "2886:2886"   # Web dashboard
    environment:
      # Database: SQLite (default) — swap to PostgreSQL for prod
      # DB_TYPE=postgresql
      # DATABASE_URL=postgresql://user:pass@host:5432/openwa
      #
      # API key for authenticating requests from Nadurr
      API_KEY: ${OPENWA_API_KEY:-nadur-dev-key}
      #
      # Optional: Redis for caching
      # REDIS_URL=redis://redis:6379
    volumes:
      - openwa-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2785/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  openwa-data:
