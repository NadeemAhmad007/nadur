services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: nadur-translate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_LOAD_ONLY: en,hi,ur,ar,ks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
